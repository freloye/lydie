<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lydie – Bon anniversaire</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      overflow:hidden;
      font-family: Georgia, serif;
      background:#000;
      color:white;
      height:100vh;
    }

    /* Fond flouté */
    .background{
      position:fixed;
      inset:0;
      background:url("pochette-lydie.png") center center / cover no-repeat;
      filter:blur(18px) brightness(0.35);
      transform:scale(1.1);
    }

    /* Overlay */
    .overlay{
      position:fixed;
      inset:0;
      background:radial-gradient(circle at center, rgba(255,255,255,0.04), rgba(0,0,0,0.7));
    }

    /* Contenu principal */
    .container{
      position:relative;
      z-index:2;
      width:100%;
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    h1{
      font-size:clamp(2.2rem, 5vw, 4rem);
      margin-bottom:10px;
      text-align:center;
      color:#f6d5a7;
      text-shadow:0 0 20px rgba(255,215,170,0.5);
    }

    .subtitle{
      font-size:clamp(1rem, 2vw, 1.4rem);
      margin-bottom:40px;
      text-align:center;
      color:#f3e7d6;
      opacity:0.9;
    }

    /* Vinyle */
    .disc-container{
      position:relative;
      width:min(70vw, 420px);
      height:min(70vw, 420px);
      display:flex;
      justify-content:center;
      align-items:center;
      margin-bottom:40px;
    }

    .disc{
      width:100%;
      height:100%;
      border-radius:50%;
      background:url("pochette-lydie.png") center center / cover no-repeat;
      animation:spin 18s linear infinite;
      box-shadow:
        0 0 40px rgba(0,0,0,0.7),
        0 0 25px rgba(255,220,180,0.25);
      position:relative;
    }

    .disc::after{
      content:"";
      position:absolute;
      width:18%;
      height:18%;
      background:#f5f5f5;
      border-radius:50%;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      box-shadow:0 0 10px rgba(0,0,0,0.3);
    }

    @keyframes spin{
      from{ transform:rotate(0deg); }
      to{ transform:rotate(360deg); }
    }

    audio{
      width:min(90vw, 500px);
      opacity:0.92;
    }

    .footer{
      margin-top:25px;
      text-align:center;
      font-size:0.95rem;
      color:#f3e7d6;
      opacity:0.8;
    }

    @media (max-width:700px){

      .disc-container{
        width:85vw;
        height:85vw;
      }

      .subtitle{
        margin-bottom:25px;
      }

      audio{
        width:95vw;
      }
    }
  </style>
</head>

<body>

  <div class="background"></div>
  <div class="overlay"></div>

  <div class="container">

    <h1>Lydie</h1>

    <div class="subtitle">
      Bon anniversaire • Toujours chic, toujours élégante
    </div>

    <div class="disc-container">
      <div class="disc"></div>
    </div>

    <audio controls autoplay>
      <source src="chanson-lydie.mp3" type="audio/mpeg">
      Votre navigateur ne supporte pas l'audio HTML5.
    </audio>

    <div class="footer">
      Une chanson familiale tendre et souriante
    </div>

  </div>

</body>
</html>
